name = "tg-service-notifications"
main = "cloudflare-worker.js"
compatibility_date = "2024-01-01"

# Cron trigger - runs every minute
[triggers]
crons = ["* * * * *"]

# KV namespace - create this in the Cloudflare dashboard first,
# then replace the id below with your actual KV namespace ID
[[kv_namespaces]]
binding = "SUBSCRIPTIONS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
